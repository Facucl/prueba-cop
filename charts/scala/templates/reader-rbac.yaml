{{- if .Values.api.rbac.reader -}}
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Values.global.projectName }}-pod-reader
rules:
- apiGroups: [""] # "" indicates the core API group
  resources: ["pods"]
  verbs: ["get", "watch", "list"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Values.global.projectName }}-read-pods
subjects:
- kind: ServiceAccount
  name: default
roleRef:
  kind: Role
  name: {{ .Values.global.projectName }}-pod-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}