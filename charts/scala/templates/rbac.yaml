{{- if .Values.api.rbac.clusterRole -}}
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Values.global.projectName }}-cluster
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "watch", "list"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ .Values.global.projectName }}-cluster
subjects:
- kind: ServiceAccount
  name:  {{ .Values.global.projectName }}-cluster
  namespace: {{ .Values.global.namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.global.projectName }}-cluster
  apiGroup: rbac.authorization.k8s.io
{{- end }}
