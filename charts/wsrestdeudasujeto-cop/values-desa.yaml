      enabled: true
      className: ""
      labels: {}
      annotations:
          haproxy.router.openshift.io/timeout: "300s"
      hosts: 
        - host: "cop-wsrestdeudasujeto.apps.apps.desa-rentas.gobiernocba.gov.ar"
          paths:
            - path: /
              pathType: Prefix
    service:
      port: 3000
      targetPort: 3000

