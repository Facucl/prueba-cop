{{- if and .Values.api.enabled .Values.global.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.global.projectName }}-app
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.global.projectName }}-app
spec:
  replicas: {{ .Values.api.replicas }}
  revisionHistoryLimit: {{ .Values.api.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: {{ .Values.global.projectName }}
  template:
    metadata:
      labels:
        app: {{ .Values.global.projectName }}
    spec:
      dnsPolicy: {{ .Values.global.dnsPolicy }}
      containers:
        - name: {{ .Values.global.projectName }}-app
          image: "{{ .Values.global.image.repository }}:{{ .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: {{ .Values.api.resources.requests.cpu }}
              memory: {{ .Values.api.resources.requests.memory }}
            limits:
              cpu: {{ .Values.api.resources.limits.cpu }}
              memory: {{ .Values.api.resources.limits.memory }}
          env:
            {{- range .Values.api.env }}
            - name: {{ .name }}
              {{- if .value }}
              value: "{{ .value }}"
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ .valueFrom.secretKeyRef.name }}
                  key: {{ .valueFrom.secretKeyRef.key }}
              {{- end }}
          {{- end }}
          volumeMounts:
            {{- range .Values.volumeMounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              subPath: {{ .subPath }}
          {{- end }}
          {{ if .Values.api.livenessProbe.enabled }}
          livenessProbe:
            failureThreshold: {{.Values.api.livenessProbe.failureThreshold | default 1}}
            initialDelaySeconds: {{.Values.api.livenessProbe.initialDelaySeconds}}
            periodSeconds: {{.Values.api.livenessProbe.periodSeconds}}
            timeoutSeconds: {{.Values.api.livenessProbe.timeoutSeconds}}
            successThreshold: {{.Values.api.livenessProbe.successThreshold}}
            httpGet:
              path: {{.Values.api.livenessProbe.path}}
              port: {{.Values.api.livenessProbe.port}}
              scheme: {{.Values.api.livenessProbe.scheme | default "HTTP"}}
          {{- end }}
          {{- if .Values.api.readinessProbe.enabled }}
          readinessProbe:
            failureThreshold: {{.Values.api.readinessProbe.failureThreshold | default 1}}
            initialDelaySeconds: {{.Values.api.readinessProbe.initialDelaySeconds}}
            periodSeconds: {{.Values.api.readinessProbe.periodSeconds}}
            timeoutSeconds: {{.Values.api.readinessProbe.timeoutSeconds}}
            successThreshold: {{.Values.api.readinessProbe.successThreshold}}
            httpGet:
              path: {{.Values.api.readinessProbe.path}}
              port: {{.Values.api.readinessProbe.port}}
              scheme: {{.Values.api.readinessProbe.scheme | default "HTTP"}}
          {{- end }}
          {{ template "api.resources" . }}
      volumes:
        - name: glpi-s3-config
          configMap:
            name: glpi-s3-config
            defaultMode: 420

{{- end }}
