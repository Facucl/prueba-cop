global:
  # enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true
  # Used to define custom react.fullname in template.
  projectName: "wsrestadhesiondao"
  # image sets the repo,tag and pullPolicy of the project
  image:
    repository: "registry-sip.cba.gov.ar:5000/wsrestadhesiondao"
    tag: release-0.0.868
    pullPolicy: IfNotPresent

  # Namespace where release will be deployed
  namespace: wsrestadhesiondao-prod
  clusterName: prod-wsrestadhesiondao

  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
  dnsPolicy: "None"
  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
  dnsConfig: 'nameservers: ["10.250.1.50", "10.250.1.51"]'

node:

  api:
    resources: 
      requests:
        cpu: 500m
        memory: 1100Mi
      limits:
        cpu: 1500m
        memory: 2048Mi

    # commandArgs custom command argument on deployment pod template
    # commandArgs: "java -jar server.jar"

    terminationGracePeriodSeconds: 1
    revisionHistoryLimit: 2
    replicaCount: 4  
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    securityContext:
      enabled: true
      runAsUser: 1000
      runAsGroup: 1000
      scc:
        enabled : true
        rootUser: false

    env: 
      - name: RUNTIME_ENVIRONMENT
        value: PROD
      - name: PROXY_URL
        value: proxysrv.gobiernocba.gov.ar
      - name: PROXY_PORT
        value: '8080'
      - name: NON_PROXY_HOSTS
        value: "localhost|127.0.0.1|*.test.cba.gov.ar|*.rentasweb.gob.ar|*.cba.gov.ar|*.cba.gob.ar|*.gobiernocba.gov.ar|*.rentascordoba.gob.ar|10.42.*|10.250.*|lb-internal"
      - name: PERM_SIZE
        value: 256m
      - name: MAX_PERM_SIZE
        value: 256m
      - name: XMS
        value: 1024m
      - name: XMX
        value: 1024m
      - name: PORT
        value: 4001
      - name: TZ
        value: America/Argentina/Buenos_Aires

    envVars:
      secretVars:
        - name: ptax-db
        - name: dbcredentials-wsrestadhesiondao-prod
        - name: awscredentials-wsrestadhesiondao-prod
        - name: oauthcredentials-wsrestadhesiondao-prod
        - name: mpcredentials-wsrestadhesiondao-prod
        - name: recaptchacredentials-wsrestadhesiondao-prod
        - name: generalenvs-wsrestadhesiondao-prod
        - name: esempleado-wsrestadhesiondao-prod
        - name: jubilados-wsrestadhesiondao-prod  
        - name: nx-credentials-wsrestadhesiondao-prod
        - name: apim-wsrestadhesiondao-prod
        - name: pagos360credentials-wsrestadhesiondao-prod
      configMapVars: {}

    livenessProbe:
      enabled: true
      path: /WSRestAdhesionDAO/api/healthz/
      port: 4001
      failureThreshold: 3
      initialDelaySeconds: 150
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    readinessProbe:
      enabled: true
      path: /WSRestAdhesionDAO/api/healthz/
      port: 4001
      failureThreshold: 3
      initialDelaySeconds: 150
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    volumeMounts: {}
    extraVolumes: {}

    ## Allowing use of ingress controllers
    ingress:
      enabled: true
      className: ""
      labels: {}
      annotations:
          haproxy.router.openshift.io/timeout: "300s" 
      hosts: 
        - host: apps.apps.prod-rentas-os.gobiernocba.gov.ar
          paths:
            - path: /WSRestAdhesionDAO/
              pathType: Prefix

    service:
        port: 80
        targetPort: 4001
