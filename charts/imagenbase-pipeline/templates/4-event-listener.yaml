apiVersion: triggers.tekton.dev/v1alpha1
kind: EventListener
metadata:
  name: webhook-{{ .Release.Name }}
spec:
  triggers:
    - name: cel-trig-with-matches
      interceptors:
        - params:   
          - name: filter
            value: body.repository_name.startsWith('DockerImagenBase')
          - name: overlays	
            value:	
              - expression: body.tag_name
                key: tag_name
              - expression: body.tag_name.split('-')[1]
                key: image_tag_name
              - expression: body.repository_name
                key: repository_name
              - expression: "body.repository_name.replace('DockerImagenBase' , '').lowerAscii()"
                key: image_name     
          ref:	
            kind: ClusterInterceptor
            name: cel

      bindings:
        - kind: TriggerBinding
          name: git-repo-source-url
          value: "{{ .Values.project.git_group_url }}/$(extensions.repository_name).git"
        - kind: TriggerBinding
          name: tag-name
          value: $(extensions.tag_name)
        - kind: TriggerBinding
          name: image-tag-name
          value: $(extensions.image_tag_name)  
        - kind: TriggerBinding
          name: ecr-registry
          value: {{ .Values.project.ecr_registry }}     
        - kind: TriggerBinding
          name: ecr-repository
          value: "$(extensions.image_name)"
      template:
        ref: "{{ .Release.Name }}-trigger-template"