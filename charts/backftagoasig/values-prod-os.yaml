global:
  # enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true
  # Used to define custom react.fullname in template.
  projectName: "backftagoasig"
  # image sets the repo,tag and pullPolicy of the project
  image:
    repository: "registry-sip.cba.gov.ar:5000/backftagoasig"
    tag: release-0.0.205
    pullPolicy: IfNotPresent

  # Namespace where release will be deployed
  namespace: backftagoasig-prod
  clusterName: prod-rentasos

  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
  dnsPolicy: "None"
  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
  dnsConfig: 'nameservers: ["10.250.1.50", "10.250.1.51"]'

node:

  api:
    resources: 
      requests:
        cpu: 500m
        memory: 1100Mi
      limits:
        cpu: 1000m
        memory: 1100Mi

    # commandArgs custom command argument on deployment pod template
    # commandArgs: "java -jar server.jar"

    terminationGracePeriodSeconds: 1
    revisionHistoryLimit: 2
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    securityContext:
      enabled: true
      runAsUser: 1000
      runAsGroup: 1000
      scc:
        enabled : true
        rootUser: false

    env: 
      - name: RUNTIME_ENVIRONMENT
        value: prod
      - name: PROXY_URL
        value: proxysrv.gobiernocba.gov.ar
      - name: PROXY_PORT
        value: '8080'
      - name: NON_PROXY_HOSTS
        value: "localhost|127.0.0.1|*.test.cba.gov.ar|*.rentasweb.gob.ar|*.cba.gov.ar|*.cba.gob.ar|*.gobiernocba.gov.ar|*.rentascordoba.gob.ar|10.42.*|10.250.*|lb-internal|kafka-1|kafka-2|kafka-3"
      - name: PERM_SIZE
        value: 256m
      - name: MAX_PERM_SIZE
        value: 256m
      - name: XMS
        value: 1024m
      - name: XMX
        value: 1024m
      - name: PORT
        value: 9000
      - name: KAFKA_URL_PSRM
        value: '["kafka-psrm-01.apps.apps.prod-rentas-os.gobiernocba.gov.ar:32090", "kafka-psrm-02.apps.apps.prod-rentas-os.gobiernocba.gov.ar:32091", "kafka-psrm-03.apps.apps.prod-rentas-os.gobiernocba.gov.ar:32092"]'
   
   #  hostAliases:
    #   ip: "10.250.2.139"
    #   hostnames:
    #     - "kafka-1"
    #     - "kafka-2"
    #     - "kafka-3"

    envVars:
      secretVars:
        - name: rentas-db
        - name: dbcredentials-backftagoasig-prod
      configMapVars: {}

    livenessProbe:
      enabled: true
      path: /FtagoAsignaciones/healthz
      port: 9000
      failureThreshold: 3
      initialDelaySeconds: 80
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    readinessProbe:
      enabled: true
      path: /FtagoAsignaciones/healthz
      port: 9000
      failureThreshold: 3
      initialDelaySeconds: 80
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    volumeMounts: 
      - mountPath: /srv/backend/config/env/.env.prod
        name: enviroments-prod
        subPath: .env.prod
        readOnly: true
    extraVolumes: 
      - name: enviroments-prod
        type: configMap
        configMapName: enviroments-prod
        defaultMode: 420

    ## Allowing use of ingress controllers
    ingress:
      enabled: true
      className: ""
      labels: {}
      annotations: {}
      hosts: 
        - host: apps.apps.prod-rentas-os.gobiernocba.gov.ar
          paths:
            - path: /FtagoAsignaciones
              pathType: Prefix

    service:
        port: 80
        targetPort: 9000
