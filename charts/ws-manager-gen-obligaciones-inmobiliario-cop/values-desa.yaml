global:
  # enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true
  # Used to define custom react.fullname in template.
  projectName: "ws-manager-gen-obligaciones-inmobiliario-cop"
  # image sets the repo,tag and pullPolicy of the project
  image:
    repository: "registry-sip.cba.gov.ar:5000/ws-manager-gen-obligaciones-inmobiliario-cop"
    tag: release-1.0.6
    pullPolicy: Always

  # Namespace where release will be deployed
  namespace: ws-manager-gen-obligaciones-inmobiliario-cop-desa
  clusterName: desa-ws-manager-gen-obligaciones-inmobiliario-cop

  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
  dnsPolicy: "ClusterFirst"
  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config

node:
  api:
    resources: 
      limits:
        cpu: 250m
        memory: 1Gi
    # commandArgs custom command argument on deployment pod template
    terminationGracePeriodSeconds: 30
    revisionHistoryLimit: 2
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    securityContext:
      enabled: true
      runAsUser: 0
      runAsGroup: 0
      scc:
        enabled : true
        rootUser: true
    envVars:
      secretVars: 
        - name: ws-manager-gen-obligaciones-inmobiliario-cop-secret-desa
      configMapVars: {}

    livenessProbe:
      enabled: false
      path: /rest/cop/manager/read/sujeto/objetos/obligaciones/healthz
      port: 3000
      failureThreshold: 30
      initialDelaySeconds: 30
      successThreshold: 1
      periodSeconds: 10
      timeoutSeconds: 1

    readinessProbe:
      enabled: false
      path: /rest/cop/manager/read/sujeto/objetos/obligaciones/healthz
      port: 3000
      failureThreshold: 3
      initialDelaySeconds: 20
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10


    volumeMounts: {}
    extraVolumes: {}

    ## Allowing use of ingress controllers
    ingress:
      enabled: true
      className: ""
      labels: {}
      annotations: 
        haproxy.router.openshift.io/timeout: 300s
        kubernetes.io/ingress.class: nginx
        nginx.ingress.kubernetes.io/proxy-read-timeout: "300000"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "300000"
        nginx.ingress.kubernetes.io/server-snippets: |
         location / {
          proxy_set_header Upgrade $http_upgrade;
          proxy_read_timeout 300;
          proxy_http_version 1.1;
          proxy_set_header X-Forwarded-Host $http_host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-For $remote_addr;
          proxy_set_header Host $host;
          proxy_set_header Connection "upgrade";
          proxy_cache_bypass $http_upgrade;
         }
      hosts: 
      
        - host: "ws-manager-gen-obligaciones-inmobiliario.apps.apps.desa-rentas.gobiernocba.gov.ar"
          paths:
            - path: /rest/imp/manager/generacion/obligaciones/inmobiliario
              pathType: Prefix
            - path: /ws/create/imp/manager/generacion/obligaciones/inmobiliario
              pathType: Prefix
            - path: /graphql/imp/manager/generacion/obligaciones/inmobiliario
              pathType: Prefix  
                
    service:
      port: 3000            
      targetPort: 3000
