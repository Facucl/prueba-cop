global:
  # enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true
  # Used to define custom react.fullname in template.
  projectName: ws-manager-consulta-masiva-cop
  # image sets the repo,tag and pullPolicy of the project
  image:
    repository: registry-sip.cba.gov.ar:5000/ws-manager-consulta-masiva-cop
    tag: release-1.0.22
    pullPolicy: IfNotPresent

  # Namespace where release will be deployed
  namespace: ws-manager-consulta-masiva-cop-preprod
  clusterName: preprod-rentas

  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
  dnsPolicy: "None"
  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
  dnsConfig: 'nameservers: ["10.250.1.50", "10.250.1.51"]'

node:

  api:
    resources: 
      requests:
        cpu: 500m
        memory: 1100Mi
      limits:
        cpu: 2500m
        memory: 2500Mi

    # commandArgs custom command argument on deployment pod template
    # commandArgs: "java -jar server.jar"

    terminationGracePeriodSeconds: 1
    revisionHistoryLimit: 2
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    securityContext:
      enabled: true
      runAsUser: 0
      runAsGroup: 0
      scc:
        enabled : true
        rootUser: true

    env: 
      - name: RUNTIME_ENVIRONMENT
        value: PREPROD
      - name: PROXY_URL
        value: proxysrv.gobiernocba.gov.ar
      - name: PROXY_PORT
        value: '8080'
      - name: NON_PROXY_HOSTS
        value: "localhost|127.0.0.1|*.test.cba.gov.ar|*.rentasweb.gob.ar|*.cba.gov.ar|*.cba.gob.ar|*.gobiernocba.gov.ar|*.rentascordoba.gob.ar|10.42.*|10.250.*|lb-internal"
      - name: PORT
        value: 3000
      - name: TZ
        value: America/Argentina/Buenos_Aires

    envVars:
      secretVars:
        - name: ptax-db
        - name: envs-ws-manager-consulta-masiva-cop-preprod
      configMapVars: {}

    livenessProbe:
      enabled: true
      path: /rest/cop/manager/consulta/masiva/situacion/fiscal/web/bff/healthz
      port: 3000
      failureThreshold: 3
      initialDelaySeconds: 80
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    readinessProbe:
      enabled: true
      path: /rest/cop/manager/consulta/masiva/situacion/fiscal/web/bff/healthz
      port: 3000
      failureThreshold: 3
      initialDelaySeconds: 80
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    volumeMounts: 
      - mountPath: /tmp/cacerts/DGCIT_Root_CA.crt
        name: dgcit-root-ca
        subPath: DGCIT_Root_CA.crt 
    extraVolumes:
      - name: dgcit-root-ca
        type: secret
        secretName: dgcit-root-ca

    ## Allowing use of ingress controllers
    ingress:
      enabled: true
      className: ""
      labels: {}
      annotations: 
        haproxy.router.openshift.io/timeout: 300s
        kubernetes.io/ingress.class: nginx
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3000"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3000"
        nginx.ingress.kubernetes.io/server-snippets: |
         location / {
          proxy_set_header Upgrade $http_upgrade;
          proxy_http_version 1.1;
          proxy_set_header X-Forwarded-Host $http_host;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-For $remote_addr;
          proxy_set_header Host $host;
          proxy_set_header Connection "upgrade";
          proxy_cache_bypass $http_upgrade;
         }


      hosts: 
        - host: consulta-masiva-sf.apps.preprod-rentas-os.gobiernocba.gov.ar
          paths:
            - path: /rest/cop/manager/consulta/masiva/situacion/fiscal/web/bff
              pathType: Prefix 
        - host: consulta-masiva-sf.apps.preprod-rentas-os.gobiernocba.gov.ar
          paths:
            - path: /graphql/cop/manager/consulta/masiva/situacion/fiscal/web/bff
              pathType: Prefix           
    service:
      port: 3000
      targetPort: 3000
    

