  ###############
  # SBT BUILD
  ###############
    - name: build-sbt
      runAfter: ["trivy-scan-repo"]
      taskRef:
        name: sbt-build
        kind: ClusterTask
      workspaces:
        - name: source
          workspace: source-dir  
      params:
        - name: SBT_CMD
          value: $(params.sbt-cmd)
        - name: HTTPS_PROXY
          value: "proxysrv.gobiernocba.gov.ar"
        - name: HTTPS_PROXY_PORT
          value: "8080" 

  ###############
  # KANIKO BUILD
  ###############
    - name: push-kaniko
      runAfter: ["build-sbt"]
      taskRef:
        name: kaniko
        kind: ClusterTask
      workspaces:
        - name: source
          workspace: source-dir
        - name: aws-credentials
          workspace: aws-credentials            
      params:
        - name: IMAGE
          value: "$(params.ecr-registry)/$(params.ecr-repository):$(params.tag-name)"
        - name: DOCKERFILE
          value: "$(params.dockerfile)"
        - name: EXTRA_ARGS
          value: [ '--build-arg' , "GOB_PROXY=http://proxysrv.gobiernocba.gov.ar:8080" , '--build-arg' , "HTTPS_PROXY_PORT=8080"]
   
    
  ######################
  # Update deploy values 
  ######################
    - name: git-cli
      runAfter: ["push-kaniko"]
      taskRef:
        name: git-cli
        kind: ClusterTask
      params:
        - name: GIT_USER_NAME
          value: tekton 
        - name: GIT_USER_EMAIL
          value: tekton@kolektor.com.ar
        - name: GIT_SCRIPT
          value: |
            if [ ! -z "$(params.deploy-to)" ]; then
              echo "[INFO] Automatic deploy to $(params.deploy-to) started"
              git clone https://git.rentasweb.gob.ar/DevOps/helm-charts.git
              cd helm-charts/charts/$(params.ecr-repository)
              ENVS=$(echo $(params.deploy-to) | sed -e 's/^[ \t]*//' | sed 's/ /|/g')
              for file in $(ls | grep -E  -e "values-(${ENVS}).*\.yaml"); do 
                sed -i  "s/tag:.*/tag: $(params.tag-name)/g" ${file}
              done
              git add -A
              git commit -m "chore: pipeline update image tag to $(params.tag-name)"
              git push origin master
            else
              echo "[INFO] Automatic deploy not requested"
            fi
      workspaces:
        - name: source
          workspace: source-dir
        - name: basic-auth
          workspace: git-basic-auth
