global:
  # enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true
  # Used to define custom react.fullname in template.
  projectName: "backbilletera"
  # image sets the repo,tag and pullPolicy of the project # preprod
  image:
    repository: "registry-sip.cba.gov.ar:5000/billetera-backbilletera"
    tag: release-1.0.15
    pullPolicy: IfNotPresent

  # Namespace where release will be deployed
  namespace: backbilletera-prod
  clusterName: prod-rentas

  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
  dnsPolicy: "None"
  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
  dnsConfig: 'nameservers: ["10.250.1.50", "10.250.1.51"]'

node:

  api:
    resources: 
      requests:
        cpu: 500m
        memory: 1000Mi
      limits:
        cpu: 1000m
        memory: 2048Mi

    # commandArgs custom command argument on deployment pod template
    # commandArgs: "java -jar server.jar"

    terminationGracePeriodSeconds: 1
    revisionHistoryLimit: 2
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    securityContext:
      enabled: true
      runAsUser: 0
      runAsGroup: 0
      scc:
        enabled : true
        rootUser: true

    env: 
      - name: RUNTIME_ENVIRONMENT
        value: prod
      - name: PROXY_URL
        value: http://proxysrv.gobiernocba.gov.ar
      - name: PROXY_PORT
        value: '8080'
      - name: no_proxy
        value: "localhost,127.0.0.1,*.test.cba.gov.ar,*.rentasweb.gob.ar,*.cba.gov.ar,*.cba.gob.ar,*.gobiernocba.gov.ar,*.rentascordoba.gob.ar,10.42.*,10.250.*,lb-internal,.tempuri.org,.azure-api.net,.dnrpa.gov.ar"
      - name: PORT
        value: 3003
      # - name: NODE_EXTRA_CA_CERTS
      #   value: /app/certs/ca.pem

    envVars: {}
    configMapVars: {}

    livenessProbe:
      enabled: true
      path: /back-billetera/api/v1/healthz
      port: 3003
      failureThreshold: 3
      initialDelaySeconds: 80
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    readinessProbe:
      enabled: true
      path: /back-billetera/api/v1/healthz
      port: 3003
      failureThreshold: 3
      initialDelaySeconds: 80
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    volumeMounts: 
      - mountPath: /app/.env
        name: envs-prod
        subPath: .env
        readOnly: true

    extraVolumes: 
      - name: envs-prod
        type: configMap
        configMapName: envs-prod
        defaultMode: 420 
        
    ## Allowing use of ingress controllers
    ingress:
      enabled: true
      className: ""
      labels: {}
      annotations:
          haproxy.router.openshift.io/timeout: "100s" 
      hosts: 
        - host: billetera.apps.apps.prod-rentas-os.gobiernocba.gov.ar
          paths:
            - path: /back-billetera/api/
              pathType: Prefix

    service:
        port: 80
        targetPort: 3003
