{{- if .Values.api.hpa.enabled }}
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.global.projectName }}-hpa
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.global.projectName }}-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.global.projectName }}-app
  minReplicas: {{ .Values.api.hpa.minReplicas }}
  maxReplicas: {{ .Values.api.hpa.maxReplicas }}
  targetCPUUtilizationPercentage: {{ .Values.api.hpa.targetCPU }}
{{- end }}
