global:
  # enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true
  # Used to define custom fullname in template.
  projectName: "javasecops"
  # Extracted from $CI_PROJECT_NAME in GitLab CI/CD
  # Image sets the repo,tag and pullPolicy of the project
  image:
    # repository: "public.ecr.aws/u4m7e8f9/java-public"
    # tag: "latest"
    repository: "kolektor/rentas-demo"
    tag: "latest"  
    pullPolicy: "IfNotPresent"
  # Namespace where release will be deployed
  namespace: "java-demo"
  clusterName: "cicd"

  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
  dnsPolicy: ""
  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
  dnsConfig: ""

api:
  # True if you want to enable api deployment.
  enabled: true

  replicaCount: 1


  securityContext:
    enabled: true
    runAsUser: 0
    runAsGroup: 0
    scc:
      enabled : true
      rootUser: true

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 200m
      memory: 1024Mi
  # Used to define custom readinessProbe settings


  envVars:
    secretVars:
      - name: dbcredentials
    configMapVars: {}

  livenessProbe:
    enabled: true
    path: /
    port: 8080
    failureThreshold: 3
    initialDelaySeconds: 120
    successThreshold: 1
    periodSeconds: 30
    timeoutSeconds: 10

  readinessProbe:
    enabled: true
    path: /
    port: 8080
    failureThreshold: 3
    initialDelaySeconds: 120
    successThreshold: 1
    periodSeconds: 30
    timeoutSeconds: 10


  terminationGracePeriodSeconds: 60
  revisionHistoryLimit: 2

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  containerName: java-app
  # Affinity Settings for django pods
  # This should be a multi-line string matching the affinity section of a
  # PodSpec.
  affinity: null

  # Toleration Settings for django pods
  # This should be a multi-line string matching the Toleration array
  # in a PodSpec.
  # Example:
  # tolerations: |
  #   kubernetes.io/os: "linux"
  tolerations: null

  # nodeSelector labels for server pod assignment, formatted as a muli-line string.
  # ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#nodeselector
  # Example:
  # nodeSelector: |
  #   node-lifecycle: "spot"
  nodeSelector: null



  ## Allowing use of ingress controllers
  ingress:
    enabled: true
    className: "openshift-default"
    labels: {}
    annotations: {}
    hosts: 
      - host: java-rentas-demo-dev.apps.cicd.syc.local
        paths:
          - path: /
            pathType: Prefix
    # tls: [ ]
    #   #  - secretName: chart-example-tls
    #   #    hosts:
    # #      - chart-example.local

  service:
    enabled: true
    name: ""
    # clusterIP controls whether a Cluster IP address is attached to the
    # API service within Kubernetes.  By default the API service will
    # be given a Cluster IP address, set to None to disable.  When disabled
    # Kubernetes will create a "headless" service.  Headless services can be
    # used to communicate with pods directly through DNS instead of a round robin
    # load balancer.
    # clusterIP: None

    # Configures the service type for the main API service.  Can be ClusterIP
    # or NodePort.
    #type: ClusterIP

    # If type is set to "NodePort", a specific nodePort value can be configured,
    # will be random if left blank.
    #nodePort: 30000

    # Port on which API server is listening
    port: 80
    # Target port to which the service should be mapped to
    targetPort: 8080
    # Extra annotations for the service definition. This should be a multi-line
    # string formatted as a map of the annotations to apply to the service.
    annotations: {}
