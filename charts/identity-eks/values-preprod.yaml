global:
  enabled: true
  projectName: identity-eks-preprod
  image:
    repository: 634937925704.dkr.ecr.us-west-2.amazonaws.com/identity-eks
    tag: release-0.0.40
    pullPolicy: IfNotPresent
  namespace: identity-eks-preprod
  clusterName: eks-preprod-rentas
  dnsPolicy: "ClusterFirst"

ingress: {}

javaeks:
  api:
    enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1500Mi

    terminationGracePeriodSeconds: 60
    revisionHistoryLimit: 2
    replicas: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    env:
      - name: RUNTIME_ENVIRONMENT
        value: PREPROD
      - name: PROXY_URL
        value: proxysrv.gobiernocba.gov.ar
      - name: PROXY_PORT
        value: '8080'
      - name: NON_PROXY_HOSTS
        value: "localhost|127.0.0.1|*.test.cba.gov.ar|*.rentasweb.gob.ar|*.cba.gov.ar|*.cba.gob.ar|*.gobiernocba.gov.ar|*.rentascordoba.gob.ar|10.42.*|10.250.*|lb-internal"
      - name: PORT
        value: "8080"
      - name: TZ
        value: America/Argentina/Buenos_Aires
        # FIN ENVS DEFAULT
      - name: KEYCLOAK_REALM
        valueFrom:
          secretKeyRef:
            name: identity-secrets
            key: KEYCLOAK_REALM
      - name: KEYCLOAK_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: identity-secrets
            key: KEYCLOAK_CLIENT_ID
      - name: KEYCLOAK_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: identity-secrets
            key: KEYCLOAK_CLIENT_SECRET
      - name: KEYCLOAK_ADMIN_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: identity-secrets
            key: KEYCLOAK_ADMIN_CLIENT_ID
      - name: KEYCLOAK_ADMIN_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: identity-secrets
            key: KEYCLOAK_ADMIN_CLIENT_SECRET
      - name: KEYCLOAK_SERVER_URL
        valueFrom:
          secretKeyRef:
            name: identity-secrets
            key: KEYCLOAK_SERVER_URL
      - name: CIDI_PASSWORD
        valueFrom:
          secretKeyRef:
            name: identity-secrets
            key: CIDI_PASSWORD
      - name: CIDI_ID_APLICACION
        valueFrom:
          secretKeyRef:
            name: identity-secrets
            key: CIDI_ID_APLICACION
      - name: CIDI_KEY_APP
        valueFrom:
          secretKeyRef:
            name: identity-secrets
            key: CIDI_KEY_APP
      - name: CIDI_API_URL
        valueFrom:
          secretKeyRef:
            name: identity-secrets
            key: CIDI_API_URL
      - name: URL_FRONTEND
        valueFrom:
          secretKeyRef:
            name: identity-secrets
            key: URL_FRONTEND
      - name: CERT_ARCA_PATH
        valueFrom:
          secretKeyRef:
            name: cert-ministerio
            key: CERT_ARCA_PATH
      - name: CERT_ARCA_PASSWORD
        valueFrom:
          secretKeyRef:
            name: cert-ministerio
            key: CERT_ARCA_PASSWORD
                       
  livenessProbe:
    enabled: true
    path: /q/health
    port: 8081
    scheme: HTTP
    failureThreshold: 3
    initialDelaySeconds: 60
    successThreshold: 1
    periodSeconds: 20
    timeoutSeconds: 5

  readinessProbe:
    enabled: true
    path: /q/health
    port: 8081
    scheme: HTTP
    failureThreshold: 6
    initialDelaySeconds: 60
    successThreshold: 1
    periodSeconds: 10
    timeoutSeconds: 5

  volumeMounts: {}
  extraVolumes: {}

  ingress:
    enabled: true
    className: alb
    name: ingress-sip-preprod
    labels: {}
    annotations:
      alb.ingress.kubernetes.io/load-balancer-name: alb-eks-preprod
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-west-2:634937925704:certificate/71243b06-3752-4f0c-95bd-2ff81d1c5e1d
      alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
      alb.ingress.kubernetes.io/ssl-redirect: '443'
      alb.ingress.kubernetes.io/group.name: alb-eks-preprod
      alb.ingress.kubernetes.io/group.order: "1"
      alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=100
      alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:us-west-2:634937925704:regional/webacl/Web_ACL_ALB_EKS/26ca6840-3acd-4ecc-939e-14767ee1bc5f
      nginx.ingress.kubernetes.io/enable-cors: "true"
      nginx.ingress.kubernetes.io/cors-allow-origin: "https://preprod.rentascordoba.gob.ar"
      nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, DELETE, POST, OPTIONS"
      nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type,X-Authorization,authorization,captcha,cuit,timestamp,X-Requested-With,url,evento,responsetype,cuitiniciador,cuittitular,usuariofront,sectorfront"
      nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    hosts:
      - host: backend-cloud-internal-preprod.rentascordoba.gob.ar
        paths:
          - path: /identity
            pathType: Prefix
            backend:
              service: 
                name: identity-eks-service
                port:
                  number: 80
      - host: backend-cloud-preprod.rentascordoba.gob.ar
        paths:
          - path: /identity
            pathType: Prefix
            backend:
              service: 
                name: identity-eks-service
                port:
                  number: 80
# CONFIG CUSTOM SERVICES
  service:
    enabled: true
    name: identity-eks-service
    type: ClusterIP
    port: 80
    targetPort: 8081
    labels:
      environment: preprod
