global:
  # enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true
  # Used to define custom react.fullname in template.
  projectName: "wsrestmobbexgateway"
  # image sets the repo,tag and pullPolicy of the project
  image:
    repository: "registro.kolektor.com.ar:5000/wsrestmobbexgateway"
    tag: release-0.0.36
    pullPolicy: IfNotPresent

  # Namespace where release will be deployed
  namespace: wsrestmobbexgateway-prod
  clusterName: prod-rentas

  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
  dnsPolicy: "None"
  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
  dnsConfig: 'nameservers: ["10.250.1.50", "10.250.1.51"]'

java:

  api:
    resources: 
      requests:
        cpu: 500m
        memory: 1100Mi
      limits:
        cpu: 1000m
        memory: 1100Mi

    # commandArgs custom command argument on deployment pod template
    # commandArgs: "java -jar server.jar"

    terminationGracePeriodSeconds: 1
    revisionHistoryLimit: 2
    replicaCount: 2
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    securityContext:
      enabled: true
      runAsUser: 1000
      runAsGroup: 1000  
      scc:
        enabled : true
        rootUser: false

    env: 
      - name: RUNTIME_ENVIRONMENT
        value: PROD
      - name: PROXY_URL
        value: proxysrv.gobiernocba.gov.ar
      - name: PROXY_PORT
        value: '8080'
      - name: NON_PROXY_HOSTS
        value: "localhost|127.0.0.1|*.test.cba.gov.ar|*.rentasweb.gob.ar|*.cba.gov.ar|*.cba.gob.ar|*.gobiernocba.gov.ar|*.rentascordoba.gob.ar|10.42.*|10.250.*|lb-internal"
      - name: PERM_SIZE
        value: 256m
      - name: MAX_PERM_SIZE
        value: 256m
      - name: XMS
        value: 1024m
      - name: XMX
        value: 1024m

    envVars:
      secretVars:
        - name: rentas-db 
        - name: dbcredentials-wsrestmobbexgateway-prod
      configMapVars: {}

    livenessProbe:
      enabled: true
      path: /WSRestMobbexGateway/healthz
      port: 8080
      failureThreshold: 3
      initialDelaySeconds: 180
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    readinessProbe:
      enabled: true
      path: /WSRestMobbexGateway/healthz
      port: 8080
      failureThreshold: 3
      initialDelaySeconds: 180
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    volumeMounts: 
      - mountPath: /tmp/cacerts/DGCIT_Root_CA.crt
        name: dgcit-root-ca
        subPath: DGCIT_Root_CA.crt
    extraVolumes:
      - name: dgcit-root-ca
        type: secret
        secretName: dgcit-root-ca

    ## Allowing use of ingress controllers
    ingress:
      enabled: true
      className: ""
      labels: {}
      annotations: {}
      hosts: 
        - host: apps.apps.prod-rentas.gobiernocba.gov.ar
          paths:
            - path: /WSRestMobbexGateway/
              pathType: Prefix
