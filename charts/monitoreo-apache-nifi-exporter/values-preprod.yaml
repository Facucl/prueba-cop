global:
  # enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true
  # Used to define custom react.fullname in template.
  projectName: "monitoreo-apache-nifi-exporter"
  # image sets the repo,tag and pullPolicy of the project
  image:
    repository: "registry-sip.cba.gov.ar:5000/monitoreo-apache-nifi-exporter"
    tag: release-1.0.9
    pullPolicy: IfNotPresent

  # Namespace where release will be deployed
  namespace: monitoreo-apache-nifi-exporter-preprod
  clusterName: preprod-monitoreo-apache-nifi-exporter

  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
  dnsPolicy: "None"
  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
  dnsConfig: 'nameservers: ["10.250.1.50", "10.250.1.51"]'

python:
  api:
    resources:
      requests:
        cpu: 500m
        memory: 1100Mi
      limits:
        cpu: 1000m
        memory: 1100Mi

    # commandArgs custom command argument on deployment pod template
    # commandArgs: "vunicorn server start:dev"

    terminationGracePeriodSeconds: 1
    revisionHistoryLimit: 2
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    securityContext:
      enabled: false

    env:
      - name: PROXY_URL
        value: proxysrv.gobiernocba.gov.ar
      - name: PROXY_PORT
        value: "8080"
      - name: NON_PROXY_HOSTS
        value: "localhost|127.0.0.1|*.preprod.cba.gov.ar|*.rentasweb.gob.ar|*.cba.gov.ar|*.cba.gob.ar|*.gobiernocba.gov.ar|*.rentascordoba.gob.ar|10.42.*|10.250.*|lb-internal"
      - name: PERM_SIZE
        value: 256m
      - name: MAX_PERM_SIZE
        value: 256m
      - name: XMS
        value: 1024m
      - name: XMX
        value: 1024m
      - name: PORT
        value: 5000

    envVars:
      secretVars:
        - name: nifi-envs
        - name: python-envs
        - name: env-envs
        - name: logging-level-config
        - name: monitor-envs
        - name: cluster-nifi-envs
        - name: cluster-cop-envs
    configMapVars: {}

    livenessProbe:
      enabled: true
      path: /nifi-monitor/healthz
      port: 5000
      failureThreshold: 3
      initialDelaySeconds: 150
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    readinessProbe:
      enabled: true
      path: /nifi-monitor/healthz
      port: 5000
      failureThreshold: 3
      initialDelaySeconds: 150
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    volumeMounts: {}
    extraVolumes: {}

    ## Allowing use of ingress controllers
    ingress:
      enabled: true
      className: ""
      labels: {}
      annotations: {}
      hosts:
        - host: internal-apps.apps.preprod-rentas-os.gobiernocba.gov.ar
          paths:
            - path: /nifi-monitor/
              pathType: Prefix

    service:
      port: 80
      targetPort: 5000
