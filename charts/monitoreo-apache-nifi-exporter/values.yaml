global:
  # enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true
  # Used to define custom react.fullname in template.
  projectName: "monitoreo-apache-nifi-exporter"
  # image sets the repo,tag and pullPolicy of the project
  image:
    repository: "registro.kolektor.com.ar:5000/monitoreo-apache-nifi-exporter"
    tag:
    pullPolicy: IfNotPresent

  # Namespace where release will be deployed
  namespace: monitoreo-apache-nifi-exporter
  clusterName: desa-monitoreo-apache-nifi-exporter

  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
  dnsPolicy: ""
  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
  dnsConfig: ""

python:
  api:
    resources:
      requests:
        cpu: 500m
        memory: 1100Mi
      limits:
        cpu: 1000m
        memory: 1100Mi

    # commandArgs custom command argument on deployment pod template

    terminationGracePeriodSeconds: 60
    revisionHistoryLimit: 2
    replicacount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    securityContext:
      enabled: true
      # runAsUser: 1000
      # runAsGroup: 1000
      runAsUser: 0
      runAsGroup: 0
      scc:
        enabled: true
        rootUser: true

    env:
      - name: PROXY_URL
        value: http://proxyurllowercase.gobiernocba.gov.ar/
      - name: PROXY_PORT
        value: "8080"
      - name: NON_PROXY_HOSTS
        value: "localhost|127.0.0.1|*.test.cba.gov.ar|*.rentasweb.gob.ar|*.cba.gov.ar|*.cba.gob.ar|*.rentascordoba.gob.ar|10.42.*|10.250.*|lb-internal"

    envVars:
      secretVars:
        - name: mdata-desa
        - name: monitoreo-apache-nifi-exporter-secret
      configMapVars: {}

    livenessProbe:
      enabled: true
      path: /monitoreo-apache-nifi-exporter/healthz
      port: 8000
      failureThreshold: 3
      initialDelaySeconds: 120
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    readinessProbe:
      enabled: false
    volumeMounts:
      - mountPath: {}
    extraVolumes: {}

    ## Allowing use of ingress controllers
    ingress:
      enabled: true
      className: ""
      labels: {}
      annotations: {}
      hosts:
        - host: hostlowercase
          paths:
            - path: /monitoreo-apache-nifi-exporter/
              pathType: Prefix
