global:
  # enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true
  # Used to define custom react.fullname in template.
  projectName: "ant-cop"
  # image sets the repo,tag and pullPolicy of the project
  image:
    repository: "registry-sip.cba.gov.ar:5000/ant-cop"
    tag: release-0.0.80
    pullPolicy: Always

  # Namespace where release will be deployed
  namespace: ant-cop-test
  clusterName: test-ant-cop

  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
  dnsPolicy: "ClusterFirst"
  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config

node:
  api:
    resources: 
      limits:
        cpu: 250m
        memory: 512Mi
    # commandArgs custom command argument on deployment pod template
    terminationGracePeriodSeconds: 30
    revisionHistoryLimit: 2
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    securityContext:
      enabled: true
      runAsUser: 1000
      runAsGroup: 1000
      scc:
        enabled : true
        rootUser: false


    env: 
      - name: NODE_EXTRA_CA_CERTS
        value: /srv/backend/cbagov.pem

    volumeMounts: 
      - mountPath: /srv/backend/cbagov.pem
        name: cbagov
        subPath: cbagov.pem

    extraVolumes: 
      - name: cbagov
        type: secret
        secretName: cbagov
        defaultMode: 420
    
    
    envVars:
      secretVars:
        - name: core-cop-secret
      configMapVars: {}

    livenessProbe:
      enabled: false
      path: /
      port: 3000
      failureThreshold: 30
      initialDelaySeconds: 30
      successThreshold: 1
      periodSeconds: 10
      timeoutSeconds: 1

    readinessProbe:
      enabled: false
      path: /
      port: 3000
      failureThreshold: 3
      initialDelaySeconds: 20
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10
                    
    ## Allowing use of ingress controllers
    ingress:
      enabled: true
      className: ""
      labels: {}
      annotations:
          haproxy.router.openshift.io/timeout: "300s"
      hosts: 
        - host: "cop-core-ant.apps.apps.test-rentas-os.gobiernocba.gov.ar"
          paths:
            - path: /
              pathType: Prefix
    service:
      port: 3000
      targetPort: 3000

