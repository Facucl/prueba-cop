global:
  # enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true
  # Used to define custom react.fullname in template.
  projectName: "ws-cop-manager-read-descuento-30-cop"
  # image sets the repo,tag and pullPolicy of the project
  image:
    repository: "registry-sip.cba.gov.ar:5000/ws-cop-manager-read-descuento-30-cop"
    tag: release-1.0.31
    pullPolicy: Always

  # Namespace where release will be deployed
  namespace: ws-cop-manager-read-descuento-30-cop-desa
  clusterName: desa-ws-cop-manager-read-descuento-30-cop

  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
  dnsPolicy: "ClusterFirst"
  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config

node:
  api:
    resources: 
      limits:
        cpu: 250m
        memory: 1Gi
    # commandArgs custom command argument on deployment pod template
    terminationGracePeriodSeconds: 30
    revisionHistoryLimit: 2
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    securityContext:
      enabled: true
      runAsUser: 0
      runAsGroup: 0
      scc:
        enabled : true
        rootUser: true

    envVars:
      secretVars: 
        - name: ws-cop-manager-read-descuento-30-cop-secret-desa
      configMapVars: {}

    livenessProbe:
      enabled: false
      path: /rest/cop/manager/read/objeto/descuento/healthz
      port: 3000
      failureThreshold: 30
      initialDelaySeconds: 30
      successThreshold: 1
      periodSeconds: 10
      timeoutSeconds: 1

    readinessProbe:
      enabled: false
      path: /rest/cop/manager/read/objeto/descuento/healthz
      port: 3000
      failureThreshold: 3
      initialDelaySeconds: 20
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10


    volumeMounts: {}
    extraVolumes: {}


    ## Allowing use of ingress controllers
    ingress:
      enabled: true
      className: ""
      labels: {}
      annotations: {}
         

      hosts: 
        - host: "copernico-descuento-rentas.apps.apps.desa-rentas.gobiernocba.gov.ar"
          paths:
            - path: /ws/obtain/cop/manager/read/objeto/descuento
              pathType: Prefix
            - path: /rest/cop/manager/read/objeto/descuento
              pathType: Prefix  
            - path: /metrics
              pathType: Prefix 


             
                
    service:
      port: 3000
      targetPort: 3000
