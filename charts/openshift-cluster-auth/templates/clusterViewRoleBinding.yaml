{{- range .Values.clusterViewGroups }}
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ . }}-cluster-view-role
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: {{ . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
---
{{- end }}
