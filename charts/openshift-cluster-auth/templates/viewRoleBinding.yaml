{{ range $group, $app := .Values.auth -}}
{{range .applications -}}
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ $group }}-{{ . }}-view-role 
  {{- if eq $.Values.global.clusterName "cicd" }}
  namespace: {{ . }}-pipeline
  {{- else }}
  namespace: {{ . }}-{{ $.Values.global.clusterName }}
  {{- end }}
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: {{ $group }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
---
{{- end }}
{{- end }}