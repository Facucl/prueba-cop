global:
  enabled: true
  projectName: aysgestiones-core-desa
  image:
    repository: 634937925704.dkr.ecr.us-west-2.amazonaws.com/aysgestiones-core
    tag: release-0.0.139
    pullPolicy: IfNotPresent
  namespace: aysgestiones-core-desa
  clusterName: eks-desa-rentas
  dnsPolicy: "ClusterFirst"
ingress: {}
  
javaeks-akka:
  serviceHeadless:
    enabled: true
    name: aysgestiones-core-headless
    publishNotReadyAddresses: true

    
  api:
    enabled: true
    nodeSelector:
        node-type: akka-ia
    tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "akka-ia"
          effect: "NoSchedule"

    resources: 
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 3000m
        memory: 3100Mi

    terminationGracePeriodSeconds: 60
    revisionHistoryLimit: 2
    replicas: 3
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    env:
      - name: RUNTIME_ENVIRONMENT
        value: DESA
      - name: PORT
        value: "8080"
      - name: PERM_SIZE
        value: 256m
      - name: MAX_PERM_SIZE
        value: 256m
      - name: XMS
        value: 1024m
      - name: XMX
        value: 1024m
      - name: TZ
        value: America/Argentina/Buenos_Aires
      - name: KUBERNETES_SERVICE_NAME
        value: "aysgestiones-core-headless"
      - name: SELECTOR_LABEL_VALUE
        value: "aysgestiones-core-desa-app"
      - name: REQUIRED_CONTACT_POINT_NR
        value: "2"
      - name: AKKA_DISCOVERY_METHOD
        value: "kubernetes-api"
      - name: AKKA_CLUSTER_BOOTSTRAP_SERVICE_NAME
        value: "aysgestiones-core-headless"
      - name: AKKA_MANAGEMENT_PORT
        value: "8558"
      - name: AKKA_MANAGEMENT_PORT_NAME
        value: "management"
      - name: AKKA_MANAGEMENT_HTTP_HOSTNAME
        valueFrom:
          fieldRef:
            fieldPath: status.podIP
      - name: AKKA_MANAGEMENT_HTTP_PORT
        value: "8558"
      - name: AKKA_CLUSTER_BOOTSTRAP_PROBING_FAILURE_TIMEOUT
