global:
  enabled: true
  projectName: wsrestbotweb
  image:
    repository: 634937925704.dkr.ecr.us-west-2.amazonaws.com/wsrestbotweb
    tag: release-0.0.152
    pullPolicy: IfNotPresent
  namespace: wsrestbotweb-desa
  clusterName: eks-desa-rentas
  dnsPolicy: "ClusterFirst"
ingress: {}
nodeeks:
  api:
    enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    terminationGracePeriodSeconds: 1
    revisionHistoryLimit: 2
    replicas: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70
    env:
      - name: RUNTIME_ENVIRONMENT
        value: DESA
      - name: PORT
        value: "8000"
      - name: TZ
        value: America/Argentina/Buenos_Aires
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-desa
            key: AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-desa
            key: AWS_SECRET_ACCESS_KEY
