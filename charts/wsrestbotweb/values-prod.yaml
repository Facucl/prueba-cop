          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: SSO_AUTH_CACHE_ENABLED
      - name: SSO_AUTH_CACHE_TTL_SECONDS
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: SSO_AUTH_CACHE_TTL_SECONDS
      - name: QDRANT_COLLECTION_NAME
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: QDRANT_COLLECTION_NAME
      - name: APIM_TOKEN_URL
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: APIM_TOKEN_URL
      - name: APIM_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: APIM_CLIENT_ID
      - name: APIM_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
