global:
  enabled: true
  projectName: wsrestbotweb
  image:
    repository: 634937925704.dkr.ecr.us-west-2.amazonaws.com/wsrestbotweb
    tag: release-1.0.7 
    pullPolicy: IfNotPresent
  namespace: wsrestbotweb-prod
  clusterName: eks-prod-rentas
  dnsPolicy: "ClusterFirst"
ingress: {}
nodeeks:
  api:
    enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    terminationGracePeriodSeconds: 1
    revisionHistoryLimit: 2
    replicas: 2
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    env:
      - name: RUNTIME_ENVIRONMENT
        value: prod
      - name: PROXY_URL
        value: proxysrv.gobiernocba.gov.ar
      - name: PROXY_PORT
        value: "8080"
      - name: NON_PROXY_HOSTS
        value: "localhost|127.0.0.1|*.test.cba.gov.ar|*.rentasweb.gob.ar|*.cba.gov.ar|*.cba.gob.ar|*.gobiernocba.gov.ar|*.rentascordoba.gob.ar|10.42.*|10.250.*|lb-internal"
      - name: PORT
        value: "8000"
      - name: TZ
        value: America/Argentina/Buenos_Aires
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: AWS_ACCESS_KEY_ID
      - name: AWS_DEFAULT_REGION
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: AWS_DEFAULT_REGION
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: AWS_SECRET_ACCESS_KEY
      - name: AZURE_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: AZURE_CLIENT_ID
      - name: AZURE_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: AZURE_CLIENT_SECRET
      - name: AZURE_TENANT_ID
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: AZURE_TENANT_ID
      - name: CORS_ORIGINS_ALLOWED
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: CORS_ORIGINS_ALLOWED
      - name: HAS_LOCAL_DELAY
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: HAS_LOCAL_DELAY
      - name: POSTGRES_ASSISTANT_RENTAS_DB_NAME
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: POSTGRES_ASSISTANT_RENTAS_DB_NAME
      - name: POSTGRES_ASSISTANT_RENTAS_PASSWORD
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: POSTGRES_ASSISTANT_RENTAS_PASSWORD
      - name: POSTGRES_ASSISTANT_RENTAS_SCHEMA_NAME
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: POSTGRES_ASSISTANT_RENTAS_SCHEMA_NAME
      - name: POSTGRES_ASSISTANT_RENTAS_URL
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: POSTGRES_ASSISTANT_RENTAS_URL
      - name: POSTGRES_ASSISTANT_RENTAS_USERNAME
        valueFrom:
          secretKeyRef:
            name: envs-wsrestbotweb-prod
            key: POSTGRES_ASSISTANT_RENTAS_USERNAME
      - name: POSTGRES_MAX_CONNECTIONS
        valueFrom:
