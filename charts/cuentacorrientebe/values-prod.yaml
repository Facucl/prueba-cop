global:
  # enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true
  # Used to define custom react.fullname in template.
  projectName: "backftago"
  # image sets the repo,tag and pullPolicy of the project
  image:
    repository: "registro.kolektor.com.ar:5000/backftago"
    tag: release-0.0.127
    pullPolicy: IfNotPresent

  # Namespace where release will be deployed
  namespace: backftago-prod
  clusterName: prod-rentas

  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
  dnsPolicy: "None"
  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
  dnsConfig: 'nameservers: ["10.250.1.50", "10.250.1.51"]'

node:

  api:
    resources: 
      requests:
        cpu: 1000m
        memory: 1500Mi
      limits:
        cpu: 2000m
        memory: 2500Mi

    # commandArgs custom command argument on deployment pod template
    # commandArgs: "java -jar server.jar"

    terminationGracePeriodSeconds: 1
    revisionHistoryLimit: 2
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    securityContext:
      enabled: true
      runAsUser: 1000
      runAsGroup: 1000
      scc:
        enabled : true
        rootUser: false

    env: 
      - name: RUNTIME_ENVIRONMENT
        value: prod
      - name: PROXY_URL
        value: http://proxysrv.gobiernocba.gov.ar 
      - name: PROXY_PORT
        value: '8080'
      - name: NON_PROXY_HOSTS
        value: "localhost|127.0.0.1|*.preprod.cba.gov.ar|*.rentasweb.gob.ar|*.cba.gov.ar|*.cba.gob.ar|*.gobiernocba.gov.ar|*.rentascordoba.gob.ar|10.42.*|10.250.*|lb-internal|*.tempuri.org|*.bancor.com.ar|*.azure-api.net"
      - name: PERM_SIZE
        value: 256m
      - name: MAX_PERM_SIZE
        value: 256m
      - name: XMS
        value: 1024m
      - name: XMX
        value: 1024m
      - name: PORT
        value: 9000
        
    envVars:
      secretVars:
        - name: rentas-db
        - name: dbcredentials-backftago-prod
        - name: awstituloscredentials-backftago-prod
        - name: awsftacredentials-backftago-prod
      configMapVars: {}

    livenessProbe:
      enabled: true
      path: /Ftago/log/healthz
      port: 9000
      failureThreshold: 3
      initialDelaySeconds: 80
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    readinessProbe:
      enabled: true
      path: /Ftago/log/healthz
      port: 9000
      failureThreshold: 3
      initialDelaySeconds: 80
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    volumeMounts: 
      - mountPath: /srv/backend/config/env/.env.prod
        name: variables-prod
        subPath: .env.prod
        readOnly: true
      - mountPath: /tmp/certs/bancor.crt.pem
        name: bancorcrt
        subPath: bancor.crt.pem
      - mountPath: /tmp/certs/bancor.key.pem
        name: bancorkey
        subPath: bancor.key.pem

    extraVolumes: 
      - name: variables-prod
        type: configMap
        configMapName: variables-prod
        defaultMode: 420 
      - name: bancorcrt
        type: secret
        secretName: bancorcrt
        defaultMode: 420
      - name: bancorkey
        type: secret
        secretName: bancorkey
        defaultMode: 420

    ## Allowing use of ingress controllers
    ingress:
      enabled: true
      className: ""
      labels: {}
      annotations: {}
      hosts: 
        - host: ftago-back.apps.apps.prod-rentas.gobiernocba.gov.ar
          paths:
            - path: /Ftago/
              pathType: Prefix

    service:
        port: 80
        targetPort: 9000