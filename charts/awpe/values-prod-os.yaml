global:
  # enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true
  # Used to define custom react.fullname in template.
  projectName: "pagoelectronicoawpe"
  # image sets the repo,tag and pullPolicy of the project
  image:
    repository: "registry-sip.cba.gov.ar:5000/jenkins_jdk7_eap64_awpe"
    tag: prod
    pullPolicy: IfNotPresent

  # Namespace where release will be deployed
  namespace: pagoelectronicoawpe-prod
  clusterName: prod-rentasos

  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
  dnsPolicy: "None"
  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
  dnsConfig: 'nameservers: ["10.250.1.50", "10.250.1.51"]'

java:

  api:
    resources: 
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: 1500m
        memory: 7168Mi

    # commandArgs custom command argument on deployment pod template
    # commandArgs: "java -jar server.jar"
    terminationGracePeriodSeconds: 60
    revisionHistoryLimit: 2
    replicacount: 0
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    # securityContext:
    #   enabled: true
    #   runAsUser: 1000
    #   runAsGroup: 1000
    #   scc:
    #     enabled : true
    #     rootUser: false
    securityContext:
      enabled: true
      runAsUser: 0
      runAsGroup: 0      
      scc:
        enabled : true
        rootUser: true

    envVars:
      secretVars: {}  
      configMapVars: {}

    env: 
      - name: ENVIRONMENT
        value: PRODUCCION
      - name: RUNTIME_ENVIRONMENT
        value: PROD
      - name: PROXY_URL
        value: proxysrv.gobiernocba.gov.ar
      - name: PROXY_PORT
        value: '8080'
      - name: NON_PROXY_HOSTS
        value: "localhost|127.0.0.1|*.test.cba.gov.ar|*.rentasweb.gob.ar|*.cba.gov.ar|*.cba.gob.ar|*.gobiernocba.gov.ar|*.rentascordoba.gob.ar|10.42.*|10.250.*|lb-internal"
      - name: PERM_SIZE
        value: 256m
      - name: MAX_PERM_SIZE
        value: 512m
      - name: XMS
        value: 1024m
      - name: XMX
        value: 7168m

    volumeMounts: {}
       - mountPath: /opt/EAP/standalone/configuration/standalone.xml
         name: standalone
         subPath: standalone.xml
       - mountPath: /usr/share/fonts
         name: fonts
         subPath: fonts
       - mountPath: /etc/hosts
         name: hosts
         subPath: hosts
    extraVolumes: {}
       - name: standalone
         type: configMap
         defaultMode: 420
       - name: fonts
         type: configMap
         defaultMode: 420

    ## Allowing use of ingress controllers
    ingress:
      enabled: true
      className: ""
      labels: {}
      annotations:
          haproxy.router.openshift.io/timeout: "100s" 
      hosts: 
        - host: apps.apps.prod-rentas-os.gobiernocba.gov.ar
          paths:
            - path: /
              pathType: Prefix

    service:
        port: 80
        targetPort: 8080
