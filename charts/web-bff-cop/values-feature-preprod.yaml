global:
  # enabled is the master enabled switch. Setting this to true or false
  # will enable or disable all the components within this chart by default.
  enabled: true
  # Used to define custom react.fullname in template.
  projectName: "web-bff-cop-feature"
  # image sets the repo,tag and pullPolicy of the project
  image:
    repository: "registry-sip.cba.gov.ar:5000/web-bff-cop"
    tag: release-1.0.254
    pullPolicy: Always

  # Namespace where release will be deployed
  namespace: web-bff-cop-preprod-feature
  clusterName: preprod-web-bff-cop

  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-s-dns-policy
  dnsPolicy: "ClusterFirst"
  # https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/#pod-dns-config
  dnsConfig: 'nameservers: ["10.250.1.50", "10.250.1.51"]'
node:
  api:
    resources: 
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 6144Mi
    # commandArgs custom command argument on deployment pod template
    terminationGracePeriodSeconds: 30
    revisionHistoryLimit: 2
    replicaCount: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 70

    securityContext:
      enabled: false
      runAsUser: 1000
      runAsGroup: 1000
      scc:
        enabled : false
        rootUser: false
    envVars:
      secretVars:
        - name: webbff-secret
      configMapVars: {}

    env:
      - name: NO_OBNS_PSRM
        value: "ON"
  

    livenessProbe:
      enabled: false
      path: /
      port: 3000
      failureThreshold: 30
      initialDelaySeconds: 30
      successThreshold: 1
      periodSeconds: 10
      timeoutSeconds: 1

    readinessProbe:
      enabled: false
      path: /
      port: 3000
      failureThreshold: 3
      initialDelaySeconds: 20
      successThreshold: 1
      periodSeconds: 30
      timeoutSeconds: 10

    volumeMounts: 
      - mountPath: /home/node/app/calcula_recargos.dmn
        name: calcula-recargos
        subPath: calcula_recargos.dmn
        readOnly: true
        
      - mountPath: /home/node/app/simulation_sitfiscal.dmn 
        name: simulation-sitfiscal
        subPath: simulation_sitfiscal.dmn 
        readOnly: true
        
      - mountPath: /home/node/app/simulation_visible.dmn 
        name: simulation-visible 
        subPath: simulation_visible.dmn 
        readOnly: true
        
      - mountPath: /home/node/app/interes.dmn
        name: interes
        subPath: interes.dmn
        readOnly: true

      - mountPath: /home/node/app/decision_30_descuento.dmns
        name: decision-treinta-descuento
        subPath: decision_30_descuento.dmn
        readOnly: true
        
      - mountPath: /home/node/app/simulation_sitfiscal_ant.dmn
        name: simulation-ant
        subPath: simulation_sitfiscal_ant.dmn
        readOnly: true
    

    extraVolumes:
      - name: calcula-recargos
        type: configMap
        configMapName: calcula-recargos
        defaultMode: 420
        
      - name: simulation-sitfiscal
        type: configMap
        configMapName: simulation-sitfiscal
        defaultMode: 420
        
      - name: simulation-visible 
        type: configMap
        configMapName: simulation-visible 
        defaultMode: 420
        
      - name: interes
        type: configMap
        configMapName: interes
        defaultMode: 420
      
      - name: decision-treinta-descuento
        type: configMap
        configMapName: decision-treinta-descuento
        defaultMode: 420
        
      - name: simulation-ant
        type: configMap
        configMapName: simulation-ant
        defaultMode: 420


    ## Allowing use of ingress controllers
    ingress:
      enabled: true
      className: ""
      labels: {}
      annotations: 
        haproxy.router.openshift.io/timeout: "60s"
      hosts: 
        - host: "web-bff-feature-cop.apps.apps.preprod-rentas-os.gobiernocba.gov.ar"
          paths:
            - path: /
              pathType: Prefix
    service:
      port: 3000
      targetPort: 3000
